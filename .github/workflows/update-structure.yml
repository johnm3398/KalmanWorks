name: Update STRUCTURE.md

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "STRUCTURE.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate STRUCTURE.md
        run: |
          echo "# Repository Structure" > STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "This file is auto-generated on every push to \`main\` and reflects the repository layout." >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "## Notebook Roles" >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "- \`notebooks/teaching/Part 1 - Introduction to Kalman Filter.ipynb\`: Pedagogical notebook for introductory teaching and intuition-building." >> STRUCTURE.md
          echo "- \`notebooks/teaching/Part 2 - Multivariate Kalman Filter.ipynb\`: Pedagogical notebook for multivariate-state teaching material and progressively richer examples." >> STRUCTURE.md
          echo "- \`notebooks/development/Kalman_Filter_class_development.ipynb\`: Framework-development notebook used to evolve the reusable KalmanWorks architecture." >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "## Implementation Roots" >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "- \`implementations/\`: Umbrella folder for language-specific KalmanWorks codebases." >> STRUCTURE.md
          echo "- \`implementations/python/\`: Active Python project root for the current KalmanWorks implementation." >> STRUCTURE.md
          echo "- \`implementations/cpp/\`: Planned C++ project root for a future equivalent implementation." >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "## File Tree" >> STRUCTURE.md
          echo "" >> STRUCTURE.md
          echo "\`\`\`text" >> STRUCTURE.md

          tree -a --dirsfirst --sort=version \
            -I ".git|.github|__pycache__|.ipynb_checkpoints|.venv|venv|node_modules" \
            >> STRUCTURE.md

          echo "\`\`\`" >> STRUCTURE.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STRUCTURE.md
          git diff --cached --quiet || git commit -m "chore: auto-update STRUCTURE.md"
          git push
